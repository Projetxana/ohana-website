<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Ohana Caribbean Ownership Club™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAFAFA;
            --text-main: #2A2A2A;
            --text-muted: #666666;
            --accent: #B2967D;
            --bg-secondary: #F4F3EF;
            --white: #FFFFFF;

            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-heading);
            font-weight: 400;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background-color: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo a {
            color: var(--white);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 0.70rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Hero */
        .page-header {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1544413660-299165566b1d?auto=format&fit=crop&q=80&w=2000') center/cover fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 0 20px;
        }

        .header-tag {
            font-family: var(--font-body);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: var(--accent);
            font-weight: 500;
        }

        .page-header h1 {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .page-header p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 16px 40px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.4s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-accent {
            background-color: var(--accent);
            color: var(--white);
        }

        .btn-accent:hover {
            background-color: #9a7f66;
        }

        @media(max-width: 900px) {
            .page-header h1 {
                font-size: 3rem;
            }

            .nav-links {
                display: none;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo"><a href="index.html">Caribbean Ownership Club™</a></div>
        <div class="nav-links">
            <a href="le-cercle.html">Le Cercle</a>
            <a href="modeles.html">Modèles</a>
            <a href="gouvernance.html">Gouvernance</a>
            <a href="budget.html">Budget</a>
            <a href="sailing-academy.html">Academy</a>
            <a href="souscription.html">Souscription</a>
            <a href="cadre-programme.html">Cadre</a>
            <a href="faq.html">FAQ</a>
            <a href="base-martinique.html">La Base</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="header-tag">Bienvenue</div>
        <h1>Ohana Caribbean<br>Ownership Club™</h1>
        <p>Une nouvelle façon d'accéder à la propriété</p>
        <a href="le-cercle.html" class="btn btn-accent">Découvrir le Cercle</a>
    </header>

</body>

</html>
